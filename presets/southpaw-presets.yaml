# ===== HARDWARE PRESETS =====
# These map detected GPU configs to model+flag combos

hardware_presets:
  single-8gb:
    main: { preset: "qwen36-27b", tier: "16gb" }
    aux: { preset: "qwen36-35b-a3b", tier: "8gb" }

  single-16gb:
    main: { preset: "darwin-28b-reason", tier: "16gb" }
    aux: { preset: "qwen36-35b-a3b", tier: "8gb" }

  single-24gb:
    main: { preset: "darwin-28b-reason", tier: "24gb" }
    aux: { preset: "apex-mtp-35b-a3b", tier: "24gb" }

  dual-24gb:
    main: { preset: "darwin-28b-reason", tier: "24gb", gpu: 0 }
    aux: { preset: "apex-mtp-35b-a3b", tier: "24gb", gpu: 1 }

  single-48gb:
    main: { preset: "darwin-28b-reason", tier: "48gb" }
    aux: { preset: "apex-mtp-35b-a3b", tier: "48gb" }

  dual-48gb:
    main: { preset: "darwin-28b-reason", tier: "48gb", gpu: 0 }
    aux: { preset: "apex-mtp-35b-a3b", tier: "48gb", gpu: 1 }

  # API-only (no local models)
  api-only:
    main: null
    aux: null

      32gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Balanced.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Balanced.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "q8_0", cache_type_v: "q8_0", spec_type: "nextn", draft_block_size: 3 }

# ═══════════════════════════════════════════════════════
#  PRESETS — named configs that set main + aux together
# ═══════════════════════════════════════════════════════

presets:
  darwin+apex:
    description: "Full local — Darwin reasoning + APEX speed"
    main: darwin-28b
    aux: apex-mtp

  darwin:
    description: "Darwin local + API auxiliary"
    main: darwin-28b
    aux: null  # falls back to Nous API

  apex:
    description: "APEX local + API auxiliary"
    main: apex-mtp
    aux: null

  api:
    description: "Full Nous API (cloud)"
    main: null
    aux: null

# ═══════════════════════════════════════════════════════

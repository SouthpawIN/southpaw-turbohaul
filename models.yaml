        url: "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q3_K_S.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 16384, flash_attn: "off" }
      24gb:
        file: "Qwen3.6-35B-A3B-UD-Q4_K_M.gguf"
        url: "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 32768, flash_attn: "off" }

  # Dense 27B with SYCL backend — SYCL is 2.4x faster than Vulkan for Q4 quants
  qwen27b-intel:

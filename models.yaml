  apex-intel:
    name: "APEX-MTP 35B-A3B (Intel)"
    description: "APEX MoE on Intel Arc — Vulkan backend for best MoE speed (38 tok/s)"
    repo: "mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF"
    params: "35B total / 3B active"
    role: auxiliary
    gpu_backend: vulkan
    strengths: [speed, tool-calling, long-context]
    port: 11501
    quants:
      8gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Nano.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Nano.gguf"
        flags: { n_gpu_layers: 15, cpu_moe: true, ctx_size: 4096, flash_attn: "off" }
      12gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        flags: { n_gpu_layers: 20, cpu_moe: true, ctx_size: 8192, flash_attn: "off" }
      16gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 16384, flash_attn: "off" }
      24gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 32768, flash_attn: "off" }

  # Non-MTP fast model — standard Qwen3.6-35B-A3B without speculative decoding
  # 22 tok/s on Vulkan, slightly slower than APEX-MTP (38 tok/s) but simpler setup
  qwen35m-intel:
    name: "Qwen3.6-35B-A3B (Intel, non-MTP)"
    description: "Fast MoE without MTP — standard Qwen3.6-35B-A3B, 22 tok/s on Arc"
    repo: "unsloth/Qwen3.6-35B-A3B-GGUF"

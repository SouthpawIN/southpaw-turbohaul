models:

  # ─── MAIN MODELS (reasoning, conversation, coding) ───

  darwin-28b:
    name: "Darwin-28B-REASON"
    description: "Graduate-level STEM reasoning, GPQA 89.39%"
    repo: "mradermacher/Darwin-28B-REASON-GGUF"
    params: "27.6B dense"
    role: main
    strengths: [reasoning, math, science, chain-of-thought]
    port: 11500
    systemd: llama-darwin
    quants:
      8gb:
        file: "Darwin-28B-REASON.Q2_K.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q2_K.gguf"
        flags: { n_gpu_layers: 20, ctx_size: 8192, flash_attn: "auto" }
      16gb:
        file: "Darwin-28B-REASON.Q3_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q3_K_M.gguf"
        flags: { n_gpu_layers: 40, ctx_size: 32768, flash_attn: "on", cache_type_k: "q4_0", cache_type_v: "q4_0" }
      24gb:
        file: "Darwin-28B-REASON.Q4_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q4_K_M.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "turbo3", cache_type_v: "turbo3" }
      32gb:
        file: "Darwin-28B-REASON.Q5_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q5_K_M.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "q8_0", cache_type_v: "q8_0" }

  # ─── AUX MODELS (fast tasks, tool calling, long context) ───

  apex-mtp:
    name: "APEX-MTP 35B-A3B"
    description: "Fast MoE + NextN speculative decoding, 256K ctx"
    repo: "mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF"
    params: "35B total / 3B active"
    role: auxiliary
    strengths: [speed, tool-calling, long-context, mtp-speculative]
    port: 11501
    systemd: llama-apex
    quants:
      8gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Nano.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Nano.gguf"
        flags: { n_gpu_layers: 15, cpu_moe: true, ctx_size: 8192, flash_attn: "auto" }
      16gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        flags: { n_gpu_layers: 30, cpu_moe: true, ctx_size: 32768, flash_attn: "on" }
      24gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf"

        url: "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ3_S.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 8192, flash_attn: "off" }
      16gb:

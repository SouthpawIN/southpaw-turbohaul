# ═══════════════════════════════════════════════════════
#  SOUTHPAW'S CURATED MODEL PICKS
#  Edit this file to add/remove models. The system handles
#  downloading, optimization, and server management.
# ═══════════════════════════════════════════════════════

models:

  # ─── MAIN MODELS (reasoning, conversation, coding) ───

  darwin-28b:
    name: "Darwin-28B-REASON"
    description: "Graduate-level STEM reasoning, GPQA 89.39%"
    repo: "mradermacher/Darwin-28B-REASON-GGUF"
    params: "27.6B dense"
    role: main
    strengths: [reasoning, math, science, chain-of-thought]
    port: 11500
    systemd: llama-darwin
    quants:
      8gb:
        file: "Darwin-28B-REASON.Q2_K.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q2_K.gguf"
        flags: { n_gpu_layers: 20, ctx_size: 8192, flash_attn: "auto" }
      16gb:
        file: "Darwin-28B-REASON.Q3_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q3_K_M.gguf"
        flags: { n_gpu_layers: 40, ctx_size: 32768, flash_attn: "on", cache_type_k: "q4_0", cache_type_v: "q4_0" }
      24gb:
        file: "Darwin-28B-REASON.Q4_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q4_K_M.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "turbo3", cache_type_v: "turbo3" }
      32gb:
        file: "Darwin-28B-REASON.Q5_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q5_K_M.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "q8_0", cache_type_v: "q8_0" }

  # ─── AUX MODELS (fast tasks, tool calling, long context) ───

  apex-mtp:
    name: "APEX-MTP 35B-A3B"
    description: "Fast MoE + NextN speculative decoding, 256K ctx"
    repo: "mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF"
    params: "35B total / 3B active"
    role: auxiliary
    strengths: [speed, tool-calling, long-context, mtp-speculative]
    port: 11501
    systemd: llama-apex
    quants:
      8gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Nano.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Nano.gguf"
        flags: { n_gpu_layers: 15, cpu_moe: true, ctx_size: 8192, flash_attn: "auto" }
      16gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Mini.gguf"
        flags: { n_gpu_layers: 30, cpu_moe: true, ctx_size: 32768, flash_attn: "on" }
      24gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "turbo3", cache_type_v: "turbo3", spec_type: "nextn", draft_block_size: 3 }
      32gb:
        file: "Qwen3.6-35B-A3B-APEX-MTP-I-Balanced.gguf"
        url: "https://huggingface.co/mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-APEX-MTP-I-Balanced.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 262144, flash_attn: "on", cache_type_k: "q8_0", cache_type_v: "q8_0", spec_type: "nextn", draft_block_size: 3 }

# ═══════════════════════════════════════════════════════
#  PRESETS — named configs that set main + aux together
# ═══════════════════════════════════════════════════════

presets:
  darwin+apex:
    description: "Full local — Darwin reasoning + APEX speed"
    main: darwin-28b
    aux: apex-mtp

  darwin:
    description: "Darwin local + API auxiliary"
    main: darwin-28b
    aux: null  # falls back to Nous API

  apex:
    description: "APEX local + API auxiliary"
    main: apex-mtp
    aux: null

  api:
    description: "Full Nous API (cloud)"
    main: null
    aux: null

# ═══════════════════════════════════════════════════════
#  API MODELS (available through Nous Portal)
# ═══════════════════════════════════════════════════════

api_models:
  qwen3.7-max:
    name: "Qwen 3.7 Max"
    provider: nous
    description: "Best reasoning via API"
    role: main

  qwen3.6-flash:
    name: "Qwen 3.6 Flash"
    provider: nous
    description: "Fast + smart daily driver"
    role: both

  claude-sonnet-4:
    name: "Claude Sonnet 4"
    provider: nous
    description: "Coding, long context"
    role: main

# ═══════════════════════════════════════════════════════
#  INTEL GPU QUANT TIERS
#  Benchmarked on Intel Arc Pro B60 24GB (garlic-clove)
#
#  BACKEND SELECTION (critical for performance):
#  - Vulkan: faster for MoE (APEX 38 tok/s) and dense Q3_K (Darwin 6.2 tok/s)
#  - SYCL:   faster for dense Q4_0/Q4_K_M (Qwen27B 17.8/16.6 tok/s)
#
#  FLASH ATTENTION:
#  - OFF is consistently 1-5% faster for token generation on Intel
#  - ON may help prompt processing on some models
#
#  Key differences from CUDA tiers:
#  - No turbo2/3/4 KV cache quant (TurboQuant is CUDA-specific)
#  - MTP speculative decoding not available on SYCL/Vulkan
#  - More conservative context window sizes
#  - Use flash_attn: "off" for best TG speed
#
#  BENCHMARK SUMMARY (Arc Pro B60, llama-bench -n 128 -p 512):
#  ┌──────────────────────────┬─────────┬─────┬────────┬────────┐
#  │ Model                    │ Backend │ FA  │ PP t/s │ TG t/s │
#  ├──────────────────────────┼─────────┼─────┼────────┼────────┤
#  │ APEX-MTP I-Mini (14GB)   │ Vulkan  │ off │ 509.7  │ 38.1   │
#  │ APEX-MTP I-Mini          │ SYCL    │ off │ 380.6  │ 23.2   │
#  │ 35B-A3B Q3_K_S (15GB)    │ Vulkan  │ off │ 456.4  │ 22.2   │
#  │ 35B-A3B Q3_K_S           │ SYCL    │ off │ 304.2  │ 22.0   │
#  │ Qwen27B Q4_K_M (16GB)    │ SYCL    │ off │ 140.3  │ 16.6   │
#  │ Qwen27B Q4_0 (15GB)      │ SYCL    │ on  │ 125.5  │ 17.8   │
#  │ Qwen27B Q4_0             │ Vulkan  │ off │ 170.9  │ 13.8   │
#  │ Qwen27B Q4_K_M           │ Vulkan  │ off │ 153.4  │  6.9   │
#  │ Darwin-28B Q3_K_S (12GB) │ Vulkan  │ off │ 175.0  │  6.2   │
#  │ Darwin-28B Q3_K_S        │ SYCL    │ off │ 137.8  │  4.7   │
#  └──────────────────────────┴─────────┴─────┴────────┴────────┘
# ═══════════════════════════════════════════════════════

intel_models:

  darwin-28b-intel:
    name: "Darwin-28B-REASON (Intel)"
    description: "Darwin reasoning on Intel Arc GPUs — Vulkan backend, FA off optimal"
    repo: "mradermacher/Darwin-28B-REASON-GGUF"
    params: "27.6B dense"
    role: main
    gpu_backend: vulkan
    strengths: [reasoning, math, science]
    port: 11500
    quants:
      8gb:
        file: "Darwin-28B-REASON.Q2_K.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q2_K.gguf"
        flags: { n_gpu_layers: 20, ctx_size: 4096, flash_attn: "off" }
      12gb:
        file: "Darwin-28B-REASON.Q3_K_S.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q3_K_S.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 8192, flash_attn: "off" }
      16gb:
        file: "Darwin-28B-REASON.Q3_K_M.gguf"
        url: "https://huggingface.co/mradermacher/Darwin-28B-REASON-GGUF/resolve/main/Darwin-28B-REASON.Q3_K_M.gguf"
        flags: { n_gpu_layers: 99, ctx_size: 16384, flash_attn: "off" }
      24gb:
